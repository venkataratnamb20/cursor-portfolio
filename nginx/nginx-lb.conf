# Load balancer + reverse proxy config
# Nginx sits in front of app containers; load balances and caches

# Docker embedded DNS for service discovery (re-resolves every 10s)
resolver 127.0.0.11 valid=10s ipv6=off;

# Upstream: Docker DNS returns multiple IPs when app is scaled
upstream app_backend {
    least_conn;
    server app:8080;
}

# Proxy cache path
proxy_cache_path /var/cache/nginx/proxy
    levels=1:2
    keys_zone=STATIC:10m
    max_size=100m
    inactive=1d
    use_temp_path=off;

server {
    listen 8080;
    server_name localhost;

    server_tokens off;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Proxy to app backends
    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Caching
        proxy_cache STATIC;
        proxy_cache_valid 200 1d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Bypass cache for HTML (SPA root/index) so deployments propagate
    location ~ ^/(index\.html)?$ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache off;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
